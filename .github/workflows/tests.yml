name: Testes Automatizados

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verificar Chrome
        run: chrome --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Subir aplicação
        run: |
          cd app
          python -m http.server 8006 &

      - name: Esperar aplicação subir
        run: |
          for i in {1..10}; do
            curl -s http://localhost:8006/ && break
            echo "Aguardando servidor..."
            sleep 2
          done

      -  name: Verificar estrutura
         run: |
          ls
          ls app
          ls app/pages

      - name: Limpar reports
        run: rm -rf report

      - name: Rodar testes
        run: |
          robot -d report -i regressivo tests/

      - name: Upload relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: |
            report/